# Prod-like demo: builds the app image and runs it against a single Postgres (no Kafka/Redis).
# One command:  docker compose -f docker-compose.demo.yml up --build
# Then open http://localhost:8080
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lootledger
      POSTGRES_PASSWORD: lootledger
      POSTGRES_DB: lootledger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootledger"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata_demo:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lootledger
      SPRING_DATASOURCE_USERNAME: lootledger
      SPRING_DATASOURCE_PASSWORD: lootledger
    ports:
      - "8080:8080"

volumes:
  pgdata_demo:
