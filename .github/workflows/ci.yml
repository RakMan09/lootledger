name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & run anti-dupe test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # GitHub-hosted Ubuntu runners include Docker, so the Testcontainers integration tests
      # (the 200-thread dupe storm, saga crash-recovery, exactly-once loot, reconciliation drift)
      # run against real Postgres, Kafka and Redis here — this is the public, reproducible proof.
      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore
